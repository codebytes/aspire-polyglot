<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Recipe Manager</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>">
  <script>
    // Fallback config for standalone (non-Aspire) runs. The prestart script
    // overwrites assets/otel-config.js at npm start time with values that
    // Aspire injects via OTEL_EXPORTER_OTLP_ENDPOINT_HTTP / OTEL_SERVICE_NAME.
    window.__OTEL_CONFIG__ = window.__OTEL_CONFIG__ || {
      otlpEndpoint: 'http://localhost:4318',
      serviceName: 'frontend',
      serviceVersion: '1.0.0'
    };
  </script>
  <script src="assets/otel-config.js"></script>
</head>

</body>
</html>
